version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: delibera-db
    environment:
      POSTGRES_DB: delibera
      POSTGRES_USER: delibera
      POSTGRES_PASSWORD: delibera123
    ports:
      - "5432:5432"
    volumes:
      - delibera-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U delibera"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: delibera-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_USER: delibera
      DB_PASS: delibera123
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/delibera
    depends_on:
      db:
        condition: service_healthy

volumes:
  delibera-data:
