# ===== Delibera - Dev Profile (PostgreSQL via Docker) =====

# ===== PostgreSQL =====
spring.datasource.url=jdbc:postgresql://localhost:5432/delibera
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER:delibera}
spring.datasource.password=${DB_PASS:delibera123}

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ===== Logging =====
logging.level.com.delibera=DEBUG
logging.level.org.springframework.security=INFO
