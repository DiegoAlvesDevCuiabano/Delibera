<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Login')}">
</head>
<body class="bg-gradient-login">

<div class="login-wrapper">
  <div class="card">
    <div class="logo-section">
      <div class="brand-logo">
        <svg th:replace="~{fragments/logo-svg :: logo(size=44)}"></svg>
        <span class="logo-text">Delibera</span>
      </div>
      <h1>Acesso da Coordenação</h1>
      <p>Entre com suas credenciais institucionais</p>
    </div>

    <div class="card-body">
      <!-- Alerta de erro -->
      <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center mb-3" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span>Email ou senha inválidos. Tente novamente.</span>
      </div>

      <!-- Alerta de logout -->
      <div th:if="${param.logout}" class="alert alert-info d-flex align-items-center mb-3" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span>Você saiu com sucesso.</span>
      </div>

      <!-- Form Login -->
      <form th:action="@{/login}" method="post">

        <div class="mb-3">
          <label class="form-label fw-semibold">Email</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope-fill"></i></span>
            <input type="email" name="username" class="form-control" placeholder="seu.email@instituicao.edu.br" required autofocus>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Senha</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input type="password" name="password" class="form-control" placeholder="Digite sua senha" required>
          </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="form-check">
            <input type="checkbox" class="form-check-input" id="remember" name="remember-me">
            <label class="form-check-label" for="remember">Lembrar de mim</label>
          </div>
          <a href="#" class="text-decoration-none" style="font-size: 0.875rem; color: var(--accent-orange);">Esqueci minha senha</a>
        </div>

        <div class="d-grid">
          <button type="submit" class="btn btn-login">
            <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
          </button>
        </div>
      </form>
    </div>

    <div class="card-footer text-center bg-light py-3">
      <small class="text-muted">
        Ainda não tem uma conta?
        <a th:href="@{/planos}" class="text-decoration-none fw-semibold" style="color: var(--accent-orange);">Contratar plano</a>
      </small>
    </div>
  </div>

  <div class="text-center mt-3">
    <a th:href="@{/}" class="text-white text-decoration-none" style="opacity: 0.85;">
      <i class="bi bi-arrow-left me-1"></i> Voltar para início
    </a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
