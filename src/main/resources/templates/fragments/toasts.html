<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!-- Toast container — incluir no final do body de cada pagina -->
<div th:fragment="toasts" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 9999;">

  <!-- Success toast -->
  <div th:if="${mensagem}" class="toast show align-items-center border-0 toast-delibera toast-success"
       role="alert">
    <div class="d-flex">
      <div class="toast-body d-flex align-items-center gap-2">
        <i class="bi bi-check-circle-fill"></i>
        <span th:text="${mensagem}"></span>
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>

  <!-- Error toast -->
  <div th:if="${erro}" class="toast show align-items-center border-0 toast-delibera toast-error"
       role="alert">
    <div class="d-flex">
      <div class="toast-body d-flex align-items-center gap-2">
        <i class="bi bi-exclamation-circle-fill"></i>
        <span th:text="${erro}"></span>
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>

  <!-- Warning toast -->
  <div th:if="${aviso}" class="toast show align-items-center border-0 toast-delibera toast-warning"
       role="alert">
    <div class="d-flex">
      <div class="toast-body d-flex align-items-center gap-2">
        <i class="bi bi-exclamation-triangle-fill"></i>
        <span th:text="${aviso}"></span>
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>

</div>

<!-- Auto-dismiss after 5s -->
<script th:fragment="toast-script">
  document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('.toast.show').forEach(function(toast) {
      setTimeout(function() {
        toast.classList.remove('show');
        toast.style.transition = 'opacity 0.5s';
        toast.style.opacity = '0';
        setTimeout(function() { toast.remove(); }, 500);
      }, 5000);
    });
  });
</script>

</body>
</html>
