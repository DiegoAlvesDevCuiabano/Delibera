<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!-- Modal de confirmacao reutilizavel (v3 styling) -->
<div th:fragment="confirm-modal" class="modal fade" id="confirmModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content" style="border: none; border-radius: 16px; overflow: hidden;">
      <div class="modal-header" style="background: rgba(239,68,68,0.06); border-bottom: 1px solid #f1f5f9; padding: 1.25rem 1.5rem;">
        <h5 class="modal-title" id="confirmModalTitle" style="font-weight: 700; color: #991b1b;">
          <i class="bi bi-exclamation-triangle-fill me-2" style="color: #ef4444;"></i>
          <span id="confirmModalTitleText">Confirmar acao</span>
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" style="padding: 1.5rem;">
        <p id="confirmModalBody" style="font-size: 0.95rem; color: #64748b; margin: 0;">
          Tem certeza que deseja realizar esta acao? Esta operacao nao pode ser desfeita.
        </p>
      </div>
      <div class="modal-footer" style="border-top: 1px solid #e2e8f0; padding: 1rem 1.5rem;">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal" style="border-radius: 10px;">Cancelar</button>
        <form id="confirmModalForm" method="post" class="d-inline">
          <input type="hidden" id="confirmModalCsrf" th:if="${_csrf}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
          <button type="submit" id="confirmModalBtn" class="btn text-white" style="background: #ef4444; border-radius: 10px; font-weight: 600;">
            Confirmar
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- JS para modal dinamico -->
<script th:fragment="confirm-modal-script">
  document.addEventListener('DOMContentLoaded', function() {
    var modal = document.getElementById('confirmModal');
    if (!modal) return;

    modal.addEventListener('show.bs.modal', function(event) {
      var trigger = event.relatedTarget;
      if (!trigger) return;

      var title = trigger.getAttribute('data-title') || 'Confirmar acao';
      var body = trigger.getAttribute('data-body') || 'Tem certeza?';
      var action = trigger.getAttribute('data-action');
      var btnText = trigger.getAttribute('data-btn-text') || 'Confirmar';
      var btnColor = trigger.getAttribute('data-btn-color') || '#ef4444';

      document.getElementById('confirmModalTitleText').textContent = title;
      document.getElementById('confirmModalBody').textContent = body;
      document.getElementById('confirmModalForm').action = action;
      document.getElementById('confirmModalBtn').textContent = btnText;
      document.getElementById('confirmModalBtn').style.background = btnColor;
    });
  });
</script>

</body>
</html>
