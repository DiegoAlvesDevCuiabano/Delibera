<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!-- Navbar publica v3 (white bg, navy brand, Georgia italic wordmark) -->
<nav th:fragment="public" class="navbar navbar-expand-lg sticky-top navbar-delibera">
  <div class="container">
    <a class="navbar-brand" th:href="@{/}">
      <svg width="34" height="34" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="40" height="40" rx="10" fill="#fff" stroke="#1e3a5f" stroke-width="1.5"/>
        <rect x="9" y="9" width="16" height="4" rx="2" fill="#f97316"/>
        <rect x="9" y="16" width="22" height="4" rx="2" fill="#3b82f6"/>
        <rect x="9" y="23" width="22" height="4" rx="2" fill="#10b981"/>
        <rect x="9" y="30" width="14" height="4" rx="2" fill="#1e3a5f"/>
      </svg>
      <span class="brand-wordmark">Delibera<span class="brand-dot">.</span></span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarPublic">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarPublic">
      <ul class="navbar-nav ms-auto me-3 align-items-lg-center">
        <li class="nav-item">
          <a class="nav-link" th:classappend="${currentUri == '/' ? 'active' : ''}" th:href="@{/}">Inicio</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:classappend="${currentUri == '/solicitacoes/nova' ? 'active' : ''}" th:href="@{/solicitacoes/nova}">Nova Solicitacao</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:classappend="${currentUri == '/consultar-protocolo' ? 'active' : ''}" th:href="@{/consultar-protocolo}">Consultar protocolo</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:classappend="${currentUri == '/planos' ? 'active' : ''}" th:href="@{/planos}">Planos</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:classappend="${currentUri == '/sobre' ? 'active' : ''}" th:href="@{/sobre}">Sobre</a>
        </li>
      </ul>
      <a th:href="@{/login}" class="btn btn-nav-login">
        <i class="bi bi-box-arrow-in-right me-1"></i> Entrar
      </a>
    </div>
  </div>
</nav>

<!-- Navbar do app (aluno logado) — v3 white bg -->
<nav th:fragment="app" class="navbar navbar-expand-lg sticky-top app-navbar">
  <div class="container">
    <a class="navbar-brand" th:href="@{/painel}">
      <svg width="34" height="34" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="40" height="40" rx="10" fill="#fff" stroke="#1e3a5f" stroke-width="1.5"/>
        <rect x="9" y="9" width="16" height="4" rx="2" fill="#f97316"/>
        <rect x="9" y="16" width="22" height="4" rx="2" fill="#3b82f6"/>
        <rect x="9" y="23" width="22" height="4" rx="2" fill="#10b981"/>
        <rect x="9" y="30" width="14" height="4" rx="2" fill="#1e3a5f"/>
      </svg>
      <span class="brand-wordmark">Delibera<span class="brand-dot">.</span></span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarApp">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarApp">
      <ul class="navbar-nav ms-auto me-3 align-items-lg-center">
        <li class="nav-item">
          <a class="nav-link" th:classappend="${currentUri == '/solicitacoes/nova' ? 'active' : ''}" th:href="@{/solicitacoes/nova}">
            <i class="bi bi-pencil-square me-1"></i> Nova Solicitacao
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:classappend="${currentUri == '/painel' ? 'active' : ''}" th:href="@{/painel}">
            <i class="bi bi-file-earmark-text me-1"></i> Acompanhar
          </a>
        </li>
      </ul>
      <form th:action="@{/logout}" method="post" class="d-inline">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit" class="btn btn-nav-login">
          <i class="bi bi-box-arrow-right me-1"></i> Sair
        </button>
      </form>
    </div>
  </div>
</nav>

</body>
</html>
